version: '3.8'

services:
  db:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: LuyenThiDB
    ports:
      - "5432:5432"

  backend:
    build: ./backend/LuyenThiTiengAnh
    container_name: backend
    ports:
      - "5000:8080"
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - backend